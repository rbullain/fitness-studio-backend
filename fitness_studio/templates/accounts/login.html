{% extends 'layouts/blank.html' %}

{% block title %}Fitness Studio | Sign In{% endblock title %}

{% block page_content %}
  <h2>Sign in</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign in</button>
  </form>

  <p>Don't have an account yet? <a href="{% url 'account_signup' %}">Sign up</a></p>
{% endblock page_content %}
