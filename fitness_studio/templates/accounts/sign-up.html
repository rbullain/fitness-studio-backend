{% extends 'layouts/blank.html' %}

{% block title %}Fitness Studio | Sign Up{% endblock title %}

{% block page_content %}
  <h2>Sign up</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign Up</button>
  </form>

  <p>Already have an account? <a href="{% url 'account_login' %}">Log in</a></p>
{% endblock page_content %}
